name: Lint

on:
  push:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies WDIO
        working-directory: PR2-WDIO
        run: npm install

      - name: Run ESLint WDIO
        working-directory: PR2-WDIO
        run: npm run lint

      - name: Run Prettier WDIO
        working-directory: PR2-WDIO
        run: npm run format
